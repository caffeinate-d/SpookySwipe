<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#07080c">
<meta name="description" content="SpookySwipe - swipe through horror movies and shows by genre.">
<title>SpookySwipe</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/favicon.svg" type="image/svg+xml">

<style>
:root {
  --bg:#050608;
  --surface:rgba(18,19,24,.72);
  --surface2:rgba(255,255,255,.055);
  --surface3:rgba(255,255,255,.09);
  --text:#f5f5f7;
  --muted:#a1a1aa;
  --accent:#ff2d55;
  --accent2:#ff453a;
  --blue:#0a84ff;
  --green:#30d158;
  --line:rgba(255,255,255,.10);
  --lineRed:rgba(255,45,85,.30);
  --shadow:rgba(0,0,0,.42);
  --blur:saturate(160%) blur(22px);
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { scroll-behavior:smooth; }
body {
  margin:0;
  min-height:100vh;
  color:var(--text);
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", Inter, Segoe UI, Arial, sans-serif;
  background:
    radial-gradient(circle at 18% 0%, rgba(255,45,85,.18), transparent 28%),
    radial-gradient(circle at 86% 18%, rgba(10,132,255,.07), transparent 24%),
    linear-gradient(135deg, #020203 0%, #08090d 56%, #110507 100%);
  overflow-x:hidden;
}
body:before {
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  opacity:.08;
  background-image:
    linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.06) 1px, transparent 1px);
  background-size:42px 42px;
  mask-image:linear-gradient(to bottom, black, transparent 88%);
}
.app {
  max-width:1180px;
  margin:auto;
  padding:22px 16px 48px;
  position:relative;
  z-index:1;
}
.header {
  display:flex;
  justify-content:space-between;
  gap:16px;
  align-items:flex-start;
  margin-bottom:18px;
}
.brand h1 {
  margin:0;
  font-size:clamp(46px,9vw,92px);
  line-height:.84;
  letter-spacing:-5px;
  font-weight:900;
}
.brand p {
  color:var(--muted);
  margin:12px 0 0;
  max-width:650px;
  line-height:1.45;
  font-size:16px;
}
.mark {
  width:132px;
  height:72px;
  flex:0 0 auto;
  border-radius:22px;
  border:1px solid var(--line);
  background:
    linear-gradient(135deg, rgba(255,255,255,.13), rgba(255,255,255,.025)),
    radial-gradient(circle at center, rgba(255,45,85,.22), transparent 56%),
    rgba(20,21,26,.72);
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.055), 0 18px 44px rgba(0,0,0,.26);
  position:relative;
  overflow:hidden;
  backdrop-filter:var(--blur);
  animation:float 5s ease-in-out infinite;
}
.mark:before,.mark:after {
  content:"";
  position:absolute;
  inset:13px 18px;
  border:2px solid rgba(255,45,85,.86);
  border-left-color:transparent;
  border-right-color:transparent;
  transform:skewX(-18deg);
  box-shadow:0 0 20px rgba(255,45,85,.24);
}
.mark:after {
  inset:22px 34px;
  border-color:rgba(255,255,255,.56);
  border-top-color:transparent;
  border-bottom-color:transparent;
  transform:skewX(18deg);
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }

.toolbar, .genres {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin:12px 0;
}
button, .button {
  border:1px solid var(--line);
  color:var(--text);
  background:linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.04)), rgba(22,23,28,.74);
  padding:10px 13px;
  border-radius:999px;
  cursor:pointer;
  font-weight:700;
  font-size:14px;
  letter-spacing:-.1px;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  min-height:42px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.10), 0 10px 26px rgba(0,0,0,.18);
  transition:transform .16s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
  backdrop-filter:var(--blur);
}
button:hover { border-color:rgba(255,255,255,.20); }
button:active { transform:scale(.96); }
button.active {
  background:linear-gradient(180deg, rgba(255,45,85,.96), rgba(191,12,42,.92));
  border-color:rgba(255,118,140,.58);
  color:#fff;
  box-shadow:0 10px 30px rgba(255,45,85,.18);
}
.miniIcon {
  width:18px;
  height:18px;
  border-radius:7px;
  display:inline-block;
  position:relative;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.16);
}
.randomIcon:before { content:""; position:absolute; inset:4px; border-radius:50%; border:2px solid var(--accent); border-left-color:transparent; }
.sortIcon:before { content:""; position:absolute; left:4px; right:4px; top:5px; height:2px; background:#fff; box-shadow:0 4px 0 rgba(255,255,255,.75), 0 8px 0 rgba(255,255,255,.5); }
.favoriteIcon:before { content:""; position:absolute; inset:5px 4px 4px; background:var(--accent); transform:rotate(45deg); border-radius:2px; }
.trailerIcon:before { content:""; position:absolute; left:7px; top:4px; border-left:7px solid #fff; border-top:5px solid transparent; border-bottom:5px solid transparent; }
.ratingIcon:before { content:""; position:absolute; inset:4px; background:linear-gradient(180deg,#fff,#bbb); clip-path:polygon(50% 0,61% 35%,98% 35%,68% 56%,79% 92%,50% 70%,21% 92%,32% 56%,2% 35%,39% 35%); }
.trendingIcon:before { content:""; position:absolute; left:4px; bottom:4px; width:10px; height:10px; border-left:2px solid var(--green); border-bottom:2px solid var(--green); transform:skew(-14deg); }
.pickIcon:before { content:""; position:absolute; inset:4px; border-radius:50%; background:radial-gradient(circle, var(--blue) 0 35%, transparent 37%), conic-gradient(var(--blue), transparent, var(--accent)); }
.resetIcon:before { content:""; position:absolute; inset:4px; border-radius:50%; border:2px solid #fff; border-right-color:transparent; }

.search {
  width:100%;
  padding:15px 16px;
  border-radius:18px;
  border:1px solid var(--line);
  background:rgba(255,255,255,.07);
  color:var(--text);
  font-size:16px;
  outline:none;
  margin:10px 0 14px;
  backdrop-filter:var(--blur);
}
.search::placeholder { color:rgba(235,235,245,.42); }

.main {
  display:grid;
  grid-template-columns:minmax(320px, 480px) 1fr;
  gap:18px;
  align-items:start;
}
.deckWrap { position:sticky; top:16px; }
.deck {
  position:relative;
  height:650px;
  max-height:72vh;
  min-height:520px;
}
.card {
  position:absolute;
  inset:0;
  border:1px solid var(--line);
  border-radius:34px;
  overflow:hidden;
  background:linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.035)), rgba(14,15,20,.88);
  box-shadow:0 28px 90px rgba(0,0,0,.42), 0 0 34px rgba(255,45,85,.10);
  touch-action:none;
  user-select:none;
  display:flex;
  flex-direction:column;
  transform-origin:center bottom;
  transition:transform .22s ease, opacity .22s ease;
  backdrop-filter:var(--blur);
}
.card:nth-child(2) { transform:scale(.96) translateY(14px); opacity:.72; }
.card:nth-child(3) { transform:scale(.92) translateY(28px); opacity:.38; }
.poster {
  flex:1;
  min-height:280px;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  background:radial-gradient(circle at center, rgba(255,45,85,.22), transparent 55%), linear-gradient(135deg, rgba(255,255,255,.08), rgba(0,0,0,.18));
}
.poster:before {
  content:"";
  position:absolute;
  inset:28px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:28px;
}
.poster .genreMark {
  width:180px;
  height:104px;
  border-radius:28px;
  border:1px solid rgba(255,255,255,.14);
  position:relative;
  background:rgba(255,255,255,.055);
  box-shadow:0 0 34px rgba(255,45,85,.14);
}
.poster .genreMark:before,.poster .genreMark:after {
  content:"";
  position:absolute;
  inset:22px 26px;
  border:3px solid rgba(255,45,85,.86);
  border-left-color:transparent;
  border-right-color:transparent;
  transform:skewX(-18deg);
}
.poster .genreMark:after {
  inset:34px 48px;
  border-color:rgba(255,255,255,.6);
  border-top-color:transparent;
  border-bottom-color:transparent;
  transform:skewX(18deg);
}
.cardInfo { padding:22px; }
.cardInfo h2 {
  margin:0;
  font-size:clamp(30px,6vw,48px);
  letter-spacing:-2px;
  line-height:.92;
  font-weight:900;
}
.meta { display:flex; gap:6px; flex-wrap:wrap; margin:12px 0; }
.pill {
  font-size:12px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:999px;
  padding:5px 8px;
  color:#e8e8ea;
  background:rgba(255,255,255,.055);
  font-weight:700;
}
.summary { color:var(--muted); line-height:1.45; margin:0; }
.keywords { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; }
.kw {
  font-size:11px;
  color:#fff;
  background:linear-gradient(180deg, rgba(255,45,85,.96), rgba(191,12,42,.90));
  padding:5px 7px;
  border-radius:999px;
  font-weight:800;
}

.stamp {
  position:absolute;
  top:34px;
  padding:10px 18px;
  border:3px solid;
  border-radius:18px;
  font-weight:900;
  font-size:38px;
  letter-spacing:-1px;
  opacity:0;
  pointer-events:none;
  transform:rotate(-14deg);
  z-index:6;
}
.stamp.no { left:28px; color:#d1d1d6; border-color:#d1d1d6; }
.stamp.yes { right:22px; color:#ff2d55; border-color:#ff2d55; transform:rotate(14deg); }
.blood {
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:0;
  z-index:5;
  background:
    radial-gradient(circle at 70% 32%, rgba(255,45,85,.90) 0 8px, transparent 9px),
    radial-gradient(circle at 62% 38%, rgba(168,0,28,.82) 0 18px, transparent 19px),
    radial-gradient(circle at 78% 48%, rgba(255,45,85,.62) 0 28px, transparent 29px);
  filter:drop-shadow(0 0 14px rgba(255,45,85,.40));
}
.card.showNo .stamp.no { animation:noStamp .55s ease; }
.card.showYes .stamp.yes { animation:yesStamp .55s ease; }
.card.showYes .blood { animation:blood .55s ease; }
@keyframes noStamp { 0%{opacity:0; transform:scale(.7) rotate(-14deg)} 40%{opacity:1; transform:scale(1.08) rotate(-14deg)} 100%{opacity:.95; transform:scale(1) rotate(-14deg)} }
@keyframes yesStamp { 0%{opacity:0; transform:scale(.7) rotate(14deg)} 40%{opacity:1; transform:scale(1.08) rotate(14deg)} 100%{opacity:.95; transform:scale(1) rotate(14deg)} }
@keyframes blood { 0%{opacity:0; transform:scale(.6)} 45%{opacity:1; transform:scale(1.05)} 100%{opacity:.78; transform:scale(1)} }

.swipeActions {
  display:flex;
  gap:14px;
  justify-content:center;
  margin-top:14px;
}
.round {
  width:112px;
  height:56px;
  border-radius:999px;
  font-size:16px;
}
.round.no { border-color:rgba(209,209,214,.22); }
.round.yes { border-color:rgba(255,45,85,.52); color:#fff; }

.panel {
  border:1px solid var(--line);
  background:rgba(14,15,20,.64);
  border-radius:26px;
  padding:14px;
  backdrop-filter:var(--blur);
  box-shadow:0 18px 50px rgba(0,0,0,.20);
}
.panelHeader {
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:center;
  margin-bottom:10px;
}
.panelHeader h2 { margin:0; letter-spacing:-1px; }
.table {
  display:grid;
  gap:8px;
  max-height:680px;
  overflow:auto;
  padding-right:4px;
}
.row {
  display:grid;
  grid-template-columns:2fr .8fr 1fr 1fr auto;
  gap:8px;
  align-items:center;
  padding:12px;
  border:1px solid rgba(255,255,255,.07);
  border-radius:18px;
  background:rgba(255,255,255,.045);
}
.row b { letter-spacing:-.2px; }
.row small { color:var(--muted); }
.row button { padding:7px 10px; font-size:12px; min-height:34px; }

.toast {
  position:fixed;
  left:50%;
  bottom:22px;
  transform:translateX(-50%) translateY(20px);
  opacity:0;
  z-index:80;
  padding:12px 16px;
  border-radius:999px;
  background:rgba(20,21,26,.88);
  border:1px solid var(--line);
  color:#fff;
  font-weight:800;
  box-shadow:0 0 30px rgba(255,45,85,.18);
  pointer-events:none;
  backdrop-filter:var(--blur);
}
.toast.show { animation:toast .9s ease forwards; }
@keyframes toast {
  0%{opacity:0; transform:translateX(-50%) translateY(20px) scale(.96)}
  18%{opacity:1; transform:translateX(-50%) translateY(0) scale(1)}
  78%{opacity:1; transform:translateX(-50%) translateY(0) scale(1)}
  100%{opacity:0; transform:translateX(-50%) translateY(10px) scale(.98)}
}

@media(max-width:900px) {
  .main { grid-template-columns:1fr; }
  .deckWrap { position:relative; top:auto; }
  .deck { height:620px; max-height:none; }
}
@media(max-width:640px) {
  .app { padding:18px 12px 36px; }
  .header { align-items:flex-start; }
  .mark { width:88px; height:54px; border-radius:18px; }
  .mark:before { inset:11px 14px; }
  .mark:after { inset:18px 24px; }
  .brand h1 { max-width:calc(100vw - 128px); font-size:46px; letter-spacing:-3px; }
  .brand p { font-size:14px; }
  .toolbar button { flex:1 1 calc(50% - 8px); }
  .genres button { flex:1 1 auto; }
  .deck { height:590px; }
  .cardInfo h2 { font-size:34px; }
  .poster { min-height:245px; }
  .row { grid-template-columns:1fr; }
  .row button { width:100%; }
}
</style>

</head>
<body>
<div class="app">
  <header class="header">
    <div class="brand">
      <h1>SpookySwipe</h1>
      <p>A clean swipe-based horror picker. Swipe left to pass. Swipe right to search the title and save it to favorites.</p>
    </div>
    <div class="mark" aria-hidden="true"></div>
  </header>

  <div class="toolbar">
    <button id="randomBtn"><span class="miniIcon randomIcon"></span><span>Random</span></button>
    <button id="sortBtn"><span class="miniIcon sortIcon"></span><span>Sort</span></button>
    <button id="favoritesBtn"><span class="miniIcon favoriteIcon"></span><span>Favorites</span></button>
    <button id="trailerBtn"><span class="miniIcon trailerIcon"></span><span>Trailer</span></button>
    <button id="ratingBtn"><span class="miniIcon ratingIcon"></span><span>Rating</span></button>
    <button id="trendingBtn"><span class="miniIcon trendingIcon"></span><span>Trending</span></button>
    <button id="pickBtn"><span class="miniIcon pickIcon"></span><span>Pick For Me</span></button>
    <button id="resetBtn"><span class="miniIcon resetIcon"></span><span>Reset</span></button>
  </div>

  <div class="genres" id="genres"></div>
  <input id="search" class="search" placeholder="Search titles, genres, keywords, focus size..." />

  <main class="main">
    <section class="deckWrap">
      <div class="deck" id="deck"></div>
      <div class="swipeActions">
        <button class="round no" id="noBtn"><span>Pass</span></button>
        <button class="round yes" id="yesBtn"><span>Pick</span></button>
      </div>
    </section>

    <section class="panel">
      <div class="panelHeader">
        <h2 id="panelTitle">Sorted Horror List</h2>
        <span id="count" class="pill"></span>
      </div>
      <div class="table" id="table"></div>
    </section>
  </main>
</div>
<div class="toast" id="toast">SpookySwipe</div>

const genres = ["All","Zombie / Infected","Haunting","Viral Outbreak","Slasher","Cult Horror","Psychological","Monster / Disaster","Modern Horror"];
let currentGenre = "All";
let deck = [];
let currentIndex = 0;
let favorites = JSON.parse(localStorage.getItem("spookySwipeFavorites") || "[]");

const deckEl = document.getElementById("deck");
const tableEl = document.getElementById("table");
const searchEl = document.getElementById("search");


function currentItem() {
  return deck[currentIndex];
}
function openTrailer() {
  const item = currentItem();
  if (!item) return;
  window.open("https://www.youtube.com/results?search_query=" + encodeURIComponent(item.title + " official trailer"), "_blank");
  toast("Opening trailer search");
}
function sortByRating() {
  // Lightweight built-in priority sort: classics/acclaimed first, then newer titles.
  const acclaim = ["The Exorcist","Alien","The Thing","Psycho","Halloween","Train to Busan","Hereditary","The Witch","The Conjuring","Get Out","A Quiet Place","The Descent","REC","28 Days Later","The Babadook"];
  deck = pool().slice().sort((a,b) => {
    const ai = acclaim.indexOf(a.title), bi = acclaim.indexOf(b.title);
    if (ai !== -1 || bi !== -1) return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    return String(b.year).localeCompare(String(a.year));
  });
  currentIndex = 0;
  renderDeck();
  renderTable(false);
  toast("Sorted by top picks");
}
function showTrending() {
  const trendingYears = ["2024","2023","2022","2021","2020"];
  deck = shuffle(pool().filter(x => trendingYears.some(y => String(x.year).startsWith(y))));
  if (!deck.length) deck = shuffle(pool());
  currentIndex = 0;
  renderDeck();
  renderTable(false);
  toast("Trending loaded");
}
function pickForMe() {
  const p = pool();
  if (!p.length) return;
  const item = p[Math.floor(Math.random()*p.length)];
  deck = [item].concat(shuffle(p.filter(x => x.id !== item.id)));
  currentIndex = 0;
  renderDeck();
  toast("Picked: " + item.title);
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.remove("show"); void t.offsetWidth; t.classList.add("show");
}
function clean(s) { return String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[m]); }
function pool() {
  const q = searchEl.value.toLowerCase();
  return ALL.filter(x => (currentGenre === "All" || x.genre === currentGenre) && (!q || JSON.stringify(x).toLowerCase().includes(q)));
}
function shuffle(arr) { return arr.slice().sort(() => Math.random() - .5); }

function initGenres() {
  document.getElementById("genres").innerHTML = genres.map(g => `<button class="${g==="All"?"active":""}" data-genre="${clean(g)}">${clean(g)}</button>`).join("");
  document.querySelectorAll("[data-genre]").forEach(btn => {
    btn.addEventListener("click", () => {
      currentGenre = btn.dataset.genre;
      document.querySelectorAll("[data-genre]").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      resetDeck();
      renderTable(false);
      toast(currentGenre + " selected");
    });
  });
}

function resetDeck() {
  deck = shuffle(pool());
  currentIndex = 0;
  renderDeck();
}

function cardHTML(item, offset=0) {
  return `<article class="card" data-id="${item.id}" style="z-index:${10-offset}">
    <div class="stamp no">NO</div><div class="stamp yes">SPOOKY</div><div class="blood"></div>
    <div class="poster"><div class="genreMark"></div></div>
    <div class="cardInfo">
      <h2>${clean(item.title)}</h2>
      <div class="meta">
        <span class="pill">${clean(item.year)}</span><span class="pill">${clean(item.type)}</span><span class="pill">${clean(item.genre)}</span>
        <span class="pill">${clean(item.runtime)}</span><span class="pill">Focus: ${clean(item.focus)}</span>
      </div>
      <p class="summary">${clean(item.summary)}</p>
      <div class="keywords">${item.keywords.map(k=>`<span class="kw">${clean(k)}</span>`).join("")}</div>
    </div>
  </article>`;
}

function renderDeck() {
  const next = deck.slice(currentIndex, currentIndex + 3);
  deckEl.innerHTML = next.length ? next.map((item,i)=>cardHTML(item,i)).join("") : `<article class="card"><div class="poster"><div class="genreMark"></div></div><div class="cardInfo"><h2>No more picks</h2><p class="summary">Hit Reset Deck or choose another genre.</p></div></article>`;
  enableDrag();
}

function swipe(direction) {
  const item = deck[currentIndex];
  const card = deckEl.querySelector(".card");
  if (!item || !card) return;
  if (direction === "right") {
    card.classList.add("showYes");
    if (!favorites.includes(item.id)) favorites.push(item.id);
    localStorage.setItem("spookySwipeFavorites", JSON.stringify(favorites));
    toast("Blood pick: " + item.title);
    setTimeout(() => window.open(item.searchUrl, "_blank"), 420);
    card.style.transform = "translateX(120vw) rotate(18deg)";
    card.style.opacity = "0";
  } else {
    card.classList.add("showNo");
    toast("Nope: " + item.title);
    card.style.transform = "translateX(-120vw) rotate(-18deg)";
    card.style.opacity = "0";
  }
  setTimeout(() => {
    currentIndex++;
    renderDeck();
    renderTable(false);
  }, 520);
}

function enableDrag() {
  const card = deckEl.querySelector(".card");
  if (!card || !deck[currentIndex]) return;
  let startX = 0, startY = 0, dragging = false;
  card.addEventListener("pointerdown", e => {
    dragging = true; startX = e.clientX; startY = e.clientY; card.setPointerCapture(e.pointerId);
  });
  card.addEventListener("pointermove", e => {
    if (!dragging) return;
    const dx = e.clientX - startX; const dy = e.clientY - startY;
    card.style.transition = "none";
    card.style.transform = `translate(${dx}px, ${dy*.25}px) rotate(${dx/18}deg)`;
    const yes = card.querySelector(".stamp.yes"); const no = card.querySelector(".stamp.no");
    if (dx > 0) yes.style.opacity = Math.min(dx/120, 1); else no.style.opacity = Math.min(Math.abs(dx)/120, 1);
  });
  card.addEventListener("pointerup", e => {
    if (!dragging) return; dragging = false;
    const dx = e.clientX - startX;
    card.style.transition = "";
    if (dx > 110) swipe("right");
    else if (dx < -110) swipe("left");
    else {
      card.style.transform = "";
      card.querySelector(".stamp.yes").style.opacity = 0;
      card.querySelector(".stamp.no").style.opacity = 0;
    }
  });
}

function renderTable(force100=true, favOnly=false) {
  let rows = favOnly ? ALL.filter(x => favorites.includes(x.id)) : pool();
  if (force100) rows = rows.slice(0,100);
  document.getElementById("panelTitle").textContent = favOnly ? "Favorites" : (force100 ? "100 Horror Picks" : "Sorted Horror List");
  document.getElementById("count").textContent = rows.length + " titles";
  tableEl.innerHTML = rows.map(x => `<div class="row">
    <div><b>${clean(x.title)}</b><br><small>${clean(x.summary)}</small></div>
    <div><small>${clean(x.year)} • ${clean(x.runtime)}</small></div>
    <div><small>${clean(x.genre)}</small></div>
    <div><small>Focus: ${clean(x.focus)}</small></div>
    <button data-open="${x.id}">Search</button>
  </div>`).join("");
  document.querySelectorAll("[data-open]").forEach(b => b.addEventListener("click", () => {
    const item = ALL.find(x => x.id == b.dataset.open);
    if (item) window.open(item.searchUrl, "_blank");
  }));
}

document.getElementById("noBtn").addEventListener("click", () => swipe("left"));
document.getElementById("yesBtn").addEventListener("click", () => swipe("right"));
document.getElementById("randomBtn").addEventListener("click", () => {
  const p = pool(); if (!p.length) return;
  const item = p[Math.floor(Math.random()*p.length)];
  deck = [item, ...shuffle(p.filter(x=>x.id!==item.id))];
  currentIndex = 0; renderDeck(); toast("Random loaded");
});
document.getElementById("sortBtn").addEventListener("click", () => {
  renderTable(true); document.querySelector(".panel").scrollIntoView({behavior:"smooth", block:"start"}); toast("Loaded up to 100 picks");
});
document.getElementById("favoritesBtn").addEventListener("click", () => {
  renderTable(true, true); toast("Favorites opened");
});
document.getElementById("resetBtn").addEventListener("click", () => { resetDeck(); renderTable(false); toast("Deck reset"); });

document.getElementById("trailerBtn").addEventListener("click", openTrailer);
document.getElementById("ratingBtn").addEventListener("click", sortByRating);
document.getElementById("trendingBtn").addEventListener("click", showTrending);
document.getElementById("pickBtn").addEventListener("click", pickForMe);

searchEl.addEventListener("input", () => { resetDeck(); renderTable(false); });

initGenres();
resetDeck();
renderTable(false);
</script>
</body>
</html>
